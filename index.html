<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Hero Section</title>
    <style>
        /* إعدادات الخلفية والخطوط */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fdfae1; /* اللون الأصفر الباهت من رسمك */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* الحاوية الرئيسية */
        .hero-container {
            position: relative;
            width: 90vw;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تنسيق الصورة الشخصية */
        .profile-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            z-index: 10;
        }

        .profile-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px; /* زوايا منحنية تشبه نمط بيكسار */
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 4px solid #fff;
        }

        /* تنسيق النصوص (Labels) */
        .label {
            position: absolute;
            font-size: 1.4rem;
            font-weight: 600;
            color: #444;
            white-space: nowrap;
            cursor: default;
            /* أنيميشن التوهج */
            animation: starGlow 4s infinite ease-in-out;
        }

        /* تأثير التوهج كالنجوم */
        @keyframes starGlow {
            0%, 100% {
                text-shadow: 0 0 5px rgba(255,255,255,0);
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                color: #000;
                text-shadow: 0 0 10px #fff, 0 0 20px #ffdb58, 0 0 30px #ffdb58;
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* توزيع العناصر بناءً على السكيتش الخاص بك */
        
        .designer {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .introvert {
            top: 25%;
            left: 30%;
            animation-delay: 0.8s;
        }

        .brave {
            top: 10%;
            left: 55%;
            animation-delay: 1.5s;
        }

        .ui-ux {
            top: 15%;
            right: 15%;
            animation-delay: 2.2s;
        }

        .websites {
            top: 45%;
            right: 5%;
            animation-delay: 3s;
        }

        /* رسم الأسهم باستخدام الـ Pseudo-elements (اختياري لمظهر فني) */
        .label::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 2px;
            background: linear-gradient(to right, #ccc, transparent);
            bottom: -10px;
            left: 0;
            opacity: 0.3;
        }

        /* لمسة إضافية: نجوم صغيرة في الخلفية */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="hero-container">
        <div class="star" style="top: 10%; left: 20%; width: 5px; height: 5px;"></div>
        <div class="star" style="top: 80%; left: 70%; width: 3px; height: 3px;"></div>
        <div class="star" style="top: 40%; left: 85%; width: 4px; height: 4px;"></div>

        <div class="label designer">designer</div>
        <div class="label introvert">introvert</div>
        <div class="label brave">brave</div>
        <div class="label ui-ux">ui ux developer</div>
        <div class="label websites">websites maker</div>

        <div class="profile-wrapper">
            <img src="https://via.placeholder.com/220x220?text=Profile+Image" alt="Rahma">
        </div>
    </div>

</body>
</html>
