<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-PREMIUM EXPERIENCE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;500;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #d1fa31;
            --gray: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- 1. Custom Cursor --- */
        #custom-cursor {
            position: fixed;
            width: 15px;
            height: 15px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* --- 2. Navigation --- */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; }

        /* --- 3. Hero Section --- */
        .hero {
            height: 120vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .hero h1 {
            font-size: 12vw;
            text-transform: uppercase;
            font-family: 'Syncopate', sans-serif;
            line-height: 0.8;
            z-index: 2;
        }

        /* --- 4. Horizontal Scroll Section --- */
        .horizontal-container {
            width: 300%;
            height: 100vh;
            display: flex;
            flex-wrap: nowrap;
            background: var(--gray);
        }

        .panel {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5vw;
            font-weight: 900;
            border-right: 1px solid #333;
        }

        /* --- 5. Project Cards with 3D Effect --- */
        .work-grid {
            padding: 10vh 5%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 100px;
        }

        .project-card {
            position: relative;
            width: 100%;
            height: 600px;
            background: var(--gray);
            border-radius: 20px;
            overflow: hidden;
            perspective: 1000px; /* For 3D */
        }

        .project-card img {
            width: 110%;
            height: 110%;
            object-fit: cover;
            position: absolute;
            top: -5%; left: -5%;
            transition: transform 0.1s ease-out;
        }

        /* --- 6. Image Trail --- */
        .trail-img {
            position: fixed;
            width: 250px;
            height: 350px;
            object-fit: cover;
            pointer-events: none;
            z-index: 10;
            border-radius: 15px;
            transform: translate(-50%, -50%);
        }

        /* --- UI Elements --- */
        .reveal-text { overflow: hidden; }
        .reveal-text span { display: inline-block; transform: translateY(100%); }

        .footer { height: 100vh; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .work-grid { grid-template-columns: 1fr; gap: 50px; }
            .hero h1 { font-size: 18vw; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="navbar">
        <div class="logo">OASIS.</div>
        <div style="font-size: 0.8rem; font-weight: 500;">SCROLL TO EXPLORE</div>
    </nav>

    <main id="main">
        <section class="hero">
            <h1 class="parallax-title" data-speed="-2">CREATIVE</h1>
            <h1 class="parallax-title" style="color: var(--accent)" data-speed="2">STUDIO</h1>
            <p style="margin-top: 2rem; opacity: 0.6;">A NEW ERA OF DIGITAL INTERACTIVE EXPERIENCE</p>
        </section>

        <div class="horizontal-overflow" style="overflow: hidden;">
            <div class="horizontal-container">
                <div class="panel">UNMATCHED SPEED</div>
                <div class="panel" style="background: var(--accent); color: black;">FLUID MOTION</div>
                <div class="panel">NEXT GENERATION</div>
            </div>
        </div>

        <section class="work-grid">
            <div class="project-card" data-parallax="0.05">
                <img src="https://picsum.photos/800/1000?random=10" alt="Work 1">
            </div>
            <div class="project-card" data-parallax="0.08" style="margin-top: 100px;">
                <img src="https://picsum.photos/800/1000?random=11" alt="Work 2">
            </div>
            <div class="project-card" data-parallax="0.04">
                <img src="https://picsum.photos/800/1000?random=12" alt="Work 3">
            </div>
            <div class="project-card" data-parallax="0.06" style="margin-top: 100px;">
                <img src="https://picsum.photos/800/1000?random=13" alt="Work 4">
            </div>
        </section>

        <section class="footer">
            <h2 style="font-size: 8vw; font-family: 'Syncopate';">LET'S CREATE.</h2>
        </section>
    </main>

    <div id="trail-container"></div>

    <script>
        // --- 1. Init Lenis Smooth Scroll ---
        const lenis = new Lenis({
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- 2. Custom Cursor Logic ---
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.5, ease: "power3.out" });
        });

        // --- 3. Hero Text Parallax ---
        gsap.utils.toArray(".parallax-title").forEach(title => {
            const speed = title.getAttribute('data-speed');
            gsap.to(title, {
                scrollTrigger: {
                    trigger: ".hero",
                    scrub: true
                },
                y: speed * 50,
                ease: "none"
            });
        });

        // --- 4. Horizontal Scroll Section ---
        const sections = gsap.utils.toArray(".panel");
        gsap.to(sections, {
            xPercent: -100 * (sections.length - 1),
            ease: "none",
            scrollTrigger: {
                trigger: ".horizontal-container",
                pin: true,
                scrub: 1,
                end: () => "+=" + document.querySelector(".horizontal-container").offsetWidth
            }
        });

        // --- 5. 3D Mouse Parallax for Cards ---
        document.querySelectorAll('.project-card').forEach(card => {
            const img = card.querySelector('img');
            card.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = card.getBoundingClientRect();
                const x = (e.clientX - left) / width - 0.5;
                const y = (e.clientY - top) / height - 0.5;
                
                gsap.to(img, {
                    x: x * 40,
                    y: y * 40,
                    rotationX: -y * 10,
                    rotationY: x * 10,
                    duration: 0.6,
                    ease: "power2.out"
                });
            });

            card.addEventListener('mouseleave', () => {
                gsap.to(img, { x: 0, y: 0, rotationX: 0, rotationY: 0, duration: 0.6 });
            });
        });

        // --- 6. Dynamic Image Trail ---
        const images = [
            "https://picsum.photos/400/600?v=1",
            "https://picsum.photos/400/600?v=2",
            "https://picsum.photos/400/600?v=3"
        ];
        let i = 0;
        window.addEventListener('mousemove', (e) => {
            if (Math.abs(e.movementX) + Math.abs(e.movementY) > 25) {
                const img = document.createElement('img');
                img.src = images[i % images.length];
                img.className = 'trail-img';
                img.style.left = e.clientX + 'px';
                img.style.top = e.clientY + 'px';
                document.getElementById('trail-container').appendChild(img);
                i++;

                gsap.fromTo(img, 
                    { scale: 0, rotation: gsap.utils.random(-25, 25) }, 
                    { scale: 1, duration: 0.5, ease: "back.out(1.7)" }
                );
                gsap.to(img, { 
                    opacity: 0, scale: 0.5, y: -100, duration: 1, delay: 0.5, 
                    onComplete: () => img.remove() 
                });
            }
        });

        // --- 7. Reveal Animations ---
        gsap.from(".hero p", {
            scrollTrigger: ".hero",
            y: 30,
            opacity: 0,
            duration: 1,
            delay: 0.5
        });

    </script>
</body>
</html>
