<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet The Maker | Hero</title>
  <style>
    /* Reset & Base */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: #fdfbf7;
    }

    /* Hero Container */
    .hero-maker {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 5vh 2rem;
      overflow: hidden;
      /* Fallback gradient until you add your AI image */
      background: linear-gradient(160deg, #fdfbf7 0%, #f4f0e8 40%, #e9e4d9 100%);
    }

    /* Optional: Uncomment below and add your image path once generated
    .hero-maker {
      background: url('./your-generated-image.png') center/cover no-repeat;
    } 
    */

    /* Header Text */
    .hero-header {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      letter-spacing: 0.1em;
      margin-top: 2vh;
      text-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }

    /* CTA Button */
    .hero-cta {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      color: #0f172a;
      padding: 1rem 2.8rem;
      border-radius: 999px;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 4vh;
      letter-spacing: 0.04em;
    }

    .hero-cta:hover {
      background: rgba(255, 255, 255, 0.85);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.12);
    }

    .hero-cta:active {
      transform: translateY(0) scale(0.98);
    }
  </style>
</head>
<body>
  <section class="hero-maker">
    <header class="hero-header">MEET THE MAKER</header>
    <button class="hero-cta">View Portfolio</button>
  </section>
</body>
</html>
