<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f4f1ea;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* GRID */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
}

/* HEADER */
.header {
  position: absolute;
  top: 50px;
  letter-spacing: 6px;
  font-size: 20px;
  color: #444;
}

/* CHARACTER (IMAGE READY) */
.character {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff 40%, #e9e6df);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.08),
    0 0 40px rgba(255,255,255,0.8);
  position: relative;
  z-index: 2;
  animation: breathe 6s ease-in-out infinite;
}

/* SOFT GLOW PULSE */
@keyframes breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

/* LIGHT LINES */
.line {
  position: absolute;
  width: 300px;
  height: 1px;
  background: linear-gradient(to right, transparent, #aaa, transparent);
  opacity: 0.4;
  animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0%,100% { opacity: 0.2; }
  50% { opacity: 0.6; }
}

/* POSITION */
.l1 { transform: rotate(20deg) translateX(200px); }
.l2 { transform: rotate(-30deg) translateX(200px); }
.l3 { transform: rotate(90deg) translateX(180px); }
.l4 { transform: rotate(150deg) translateX(200px); }
.l5 { transform: rotate(-150deg) translateX(200px); }

/* TEXT */
.label {
  position: absolute;
  font-size: 14px;
  color: #666;
  letter-spacing: 1px;
  transition: 0.3s;
}

.label:hover {
  color: #000;
  transform: scale(1.1);
}

/* POSITIONS */
.designer { top: 25%; left: 20%; }
.introvert { top: 35%; left: 28%; }
.brave { top: 15%; }
.uiux { top: 25%; right: 20%; }
.web { top: 40%; right: 18%; }

/* CTA */
.cta {
  position: absolute;
  bottom: 50px;
  padding: 12px 28px;
  border-radius: 30px;
  border: 1px solid #ccc;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  letter-spacing: 1px;
  transition: 0.3s;
}

.cta:hover {
  border-color: #000;
  transform: translateY(-3px);
}

/* PARTICLES */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div class="hero">

  <canvas id="particles"></canvas>

  <div class="header">MEET THE MAKER</div>

  <!-- CHARACTER -->
  <div class="character"></div>

  <!-- LINES -->
  <div class="line l1"></div>
  <div class="line l2"></div>
  <div class="line l3"></div>
  <div class="line l4"></div>
  <div class="line l5"></div>

  <!-- TEXT -->
  <div class="label designer">designer</div>
  <div class="label introvert">introvert</div>
  <div class="label brave">brave</div>
  <div class="label uiux">ui ux developer</div>
  <div class="label web">websites maker</div>

  <button class="cta">Explore Work</button>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.3,
    speedY: (Math.random() - 0.5) * 0.3
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
