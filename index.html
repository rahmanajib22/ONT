<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Interactive UI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg: #0d0d0d;
            --text: #ffffff;
            --accent: #bcff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* 7. Hover-Responsive Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            mix-blend-mode: difference;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .navbar.nav-hidden { transform: translateY(-100%); }

        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }

        /* 8. Micro-interactions: Raised-to-Pressed */
        .cta-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0.8rem 1.8rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0px #8ba81a;
        }

        .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0px #8ba81a; }
        .cta-btn:active { transform: translateY(2px); box-shadow: 0 2px 0px #8ba81a; }

        /* Sections */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 5vh 5%;
        }

        /* 2. Scroll-Triggered Parallax Text */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .parallax-text {
            font-size: 15vw;
            font-weight: 900;
            white-space: nowrap;
            text-transform: uppercase;
            line-height: 0.8;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
        }

        .parallax-text.filled {
            color: var(--text);
            -webkit-text-stroke: 0;
        }

        /* 3. Mouse-Follow Image Trail */
        .trail-img {
            position: fixed;
            width: 200px;
            height: 280px;
            object-fit: cover;
            pointer-events: none;
            z-index: 50;
            border-radius: 8px;
            transform: translate(-50%, -50%);
        }

        /* 6. Staggered Fade-In */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            margin-top: 5rem;
        }

        .card {
            background: #1a1a1a;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1);
            transition: filter 0.5s ease;
        }

        .card:hover img { filter: grayscale(0); }

        /* 5. Scroll-to-Blur Transition */
        .blur-target {
            transition: filter 0.2s ease;
        }

        .footer-spacer { height: 50vh; }

        @media (max-width: 768px) {
            .parallax-text { font-size: 20vw; }
            .trail-img { width: 150px; height: 210px; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="logo">GENESIS.</div>
        <button class="cta-btn">GET STARTED</button>
    </nav>

    <main id="scroll-wrapper">
        
        <section class="blur-target" id="hero">
            <div class="marquee-container">
                <h1 class="parallax-text t-left">Innovative</h1>
                <h1 class="parallax-text filled t-right">Experience</h1>
                <h1 class="parallax-text t-left">Digital Design</h1>
            </div>
        </section>

        <section id="work">
            <h2 style="font-size: 3rem; margin-bottom: 2rem;">SELECTED WORKS</h2>
            <div class="grid">
                <div class="card reveal">
                    <img src="https://picsum.photos/600/800?random=1" alt="Project">
                </div>
                <div class="card reveal">
                    <img src="https://picsum.photos/600/800?random=2" alt="Project">
                </div>
                <div class="card reveal">
                    <img src="https://picsum.photos/600/800?random=3" alt="Project">
                </div>
            </div>
        </section>

        <div class="footer-spacer"></div>
    </main>

    <div id="trail-container"></div>

    <script>
        // --- 1. LENIS SMOOTH SCROLL ---
        const lenis = new Lenis();
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);

        // --- 2. PARALLAX TEXT MOVEMENT ---
        gsap.to(".t-left", {
            scrollTrigger: {
                trigger: "#hero",
                start: "top top",
                end: "bottom top",
                scrub: 1
            },
            x: -200
        });

        gsap.to(".t-right", {
            scrollTrigger: {
                trigger: "#hero",
                start: "top top",
                end: "bottom top",
                scrub: 1
            },
            x: 200
        });

        // --- 3. MOUSE-FOLLOW IMAGE TRAIL ---
        const trailContainer = document.getElementById('trail-container');
        const images = [
            "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=400&q=80",
            "https://images.unsplash.com/photo-1550684847-75bdda21cc95?auto=format&fit=crop&w=400&q=80",
            "https://images.unsplash.com/photo-1550684848-86a5d8727436?auto=format&fit=crop&w=400&q=80"
        ];
        let i = 0;

        window.addEventListener('mousemove', (e) => {
            // Logic to create image every 150px of movement
            if (Math.abs(e.movementX) + Math.abs(e.movementY) > 20) {
                const img = document.createElement('img');
                img.src = images[i % images.length];
                img.classList.add('trail-img');
                img.style.left = e.clientX + 'px';
                img.style.top = e.clientY + 'px';
                
                trailContainer.appendChild(img);
                i++;

                // Animation for trail images
                gsap.fromTo(img, 
                    { scale: 0, opacity: 0, rotation: gsap.utils.random(-20, 20) },
                    { scale: 1, opacity: 1, duration: 0.4, ease: "power2.out" }
                );

                gsap.to(img, {
                    scale: 0.2,
                    opacity: 0,
                    duration: 0.8,
                    delay: 0.4,
                    onComplete: () => img.remove()
                });
            }
        });

        // --- 5. SCROLL-TO-BLUR ---
        gsap.to(".blur-target", {
            scrollTrigger: {
                trigger: "#hero",
                start: "20% top",
                end: "bottom top",
                scrub: true
            },
            filter: "blur(40px)",
            opacity: 0
        });

        // --- 6. STAGGERED REVEAL ---
        gsap.utils.toArray(".reveal").forEach((el) => {
            gsap.from(el, {
                scrollTrigger: {
                    trigger: el,
                    start: "top 85%",
                },
                y: 100,
                opacity: 0,
                duration: 1.2,
                ease: "power4.out"
            });
        });

        // --- 7. STICKY NAV LOGIC ---
        let lastScroll = 0;
        const nav = document.getElementById('navbar');

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll > lastScroll && currentScroll > 100) {
                nav.classList.add('nav-hidden');
            } else {
                nav.classList.remove('nav-hidden');
            }
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
